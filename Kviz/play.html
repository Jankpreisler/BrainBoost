<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Quiz</title>
<link rel="stylesheet" href="play.css">
<script src="script.js"></script>
</head>

<body>

<div class="quiz">

    <div class="topbar">
        <a href="index.html" class="quit">← Quit</a>
    </div>

    <div class="info">
        <span id="questionCount">Question 1/10</span>
        <span class="timer" id="timer">⏱ 12s</span>
    </div>

    <div class="progressbar" id="questionprogressbar"></div>

    <div class="progressbar green" id="timerProgress"></div>

    <div class="questionbox">
        <h1 id="Question">Question text</h1>
    </div>

    <div class="answers">

        <button class="answer" id="answear1">
            <span class="letter">A</span>
            <span class="text">Answer 1</span>
        </button>

        <button class="answer" id="answear2">
            <span class="letter">B</span>
            <span class="text">Answer 2</span>
        </button>

        <button class="answer" id="answear3">
            <span class="letter">C</span>
            <span class="text">Answer 3</span>
        </button>

        <button class="answer" id="answear4">
            <span class="letter">D</span>
            <span class="text">Answer 4</span>
        </button>

    </div>

</div>


<script>
const tema = localStorage.getItem("brainboostTema");

if (tema === "geografia") {
    document.write('<script src="geografia.js"><\/script>');
} else if (tema === "programovanie") {
    document.write('<script src="programovanie.js"><\/script>');
} else if (tema === "filmy") {
    document.write('<script src="filmy.js"><\/script>');
} else if (tema === "sport") {
    document.write('<script src="sport.js"><\/script>');
} else if (tema === "general") {
    document.write('<script src="general.js"><\/script>');
} else {
    document.write('<script src="geografia.js"><\/script>');
}
</script>
</body>
</html>
