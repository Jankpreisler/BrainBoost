<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainBoost</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="telo">

    <div class="main">

        <div class="top">
            <div class="levelbox">LEVEL 12</div>
            <div class="scorebox">SCORE 2450</div>
            <div class="difficultybox">DIFFICULTY Impossible</div>
        </div>

        <div class="center">
            <img class="logo" src="logo_brainboost.png" alt="Brain Boost Logo">

            <div class="menu">
                <a href="play.html" class="Playbutton">
                    <span class="left">
                        <span class="icon-container">
                            <img src="Iconplay.svg" alt="" class="icon">
                        </span>
                        <span class="button-text">Play</span>
                    </span>
                    <span class="arrow">→</span>
                </a>

                <a href="#" class="Mixmodebutton">
                    <span class="left">
                        <span class="icon-container">
                            <img src="Iconmixmode.svg" alt="" class="icon">
                        </span>
                        <span class="button-text">Mix Mode</span>
                    </span>
                    <span class="arrow">→</span>
                </a>

                <a href="#" class="Topicsbutton">
                    <span class="left">
                        <span class="icon-container">
                            <img src="Icontopics.svg" alt="" class="icon">
                        </span>
                        <span class="button-text">Topics</span>
                    </span>
                    <span class="arrow">→</span>
                </a>

                <a href="#" class="ScoreLeaderboardbutton">
                    <span class="left">
                        <span class="icon-container">
                            <img src="Iconscore.svg" alt="" class="icon">
                        </span>
                        <span class="button-text">Score / Leaderboard</span>
                    </span>
                    <span class="arrow">→</span>
                </a>

                <a href="#" class="Difficultybutton">
                    <span class="left">
                        <span class="icon-container">
                            <img src="Icondifficulty.svg" alt="" class="icon">
                        </span>
                        <span class="button-text">Difficulty</span>
                    </span>
                    <span class="arrow">→</span>
                </a>
            </div>
        </div>

        <div class="bottom">
            <div class="progress-text">
                <span>Daily Progress</span>
                <span>7/10</span>
            </div>

            <div class="progressbar">
                <div class="progressfill"></div>
            </div>
        </div>

    </div>

</body>
</html>
